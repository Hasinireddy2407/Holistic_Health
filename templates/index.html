<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Holistic Health System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f7f4; }
    .hero { background: linear-gradient(135deg, #1a6b4a, #52b788);
            color: #fff; padding: 48px 0 36px; text-align: center; margin-bottom: 32px; }
    .hero h1 { font-weight: 700; font-size: 2rem; }
    .hero p  { opacity: 0.88; }
    .card    { border: none; border-radius: 16px;
               box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .section-title { color: #1a6b4a; font-weight: 600;
                     border-left: 4px solid #52b788;
                     padding-left: 10px; margin-bottom: 16px; }
    .btn-submit { background: #1a6b4a; border: none;
                  padding: 12px 48px; font-size: 1.1rem;
                  border-radius: 30px; transition: all 0.2s; }
    .btn-submit:hover { background: #145c3e; transform: translateY(-1px); }
    label { font-weight: 500; color: #333; }
    .form-control:focus, .form-select:focus {
      border-color: #52b788; box-shadow: 0 0 0 0.2rem rgba(82,183,136,0.25); }
  </style>
</head>
<body>

<div class="hero">
  <h1>🌿 AI-Based Holistic Health Recommendation System</h1>
  <p>Personalised health analysis using K-Means · Random Forest · KNN</p>
</div>

<div class="container pb-5">
  <div class="card p-4 p-md-5">
    <form action="/predict" method="POST" id="healthForm">
      <div class="row g-4">

        <!-- Personal Info -->
        <div class="col-12">
          <div class="section-title">Personal Information</div>
        </div>
        <div class="col-md-4">
          <label>Full Name</label>
          <input type="text" class="form-control" name="name" placeholder="Your name" required>
        </div>
        <div class="col-md-4">
          <label>Age</label>
          <input type="number" class="form-control" name="age" min="10" max="100" placeholder="e.g. 21" required>
        </div>
        <div class="col-md-4">
          <label>Gender</label>
          <select class="form-select" name="gender" required>
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="col-md-4">
          <label>Height (cm)</label>
          <input type="number" class="form-control" name="height"
                 min="100" max="250" step="0.1" placeholder="e.g. 165" required>
        </div>
        <div class="col-md-4">
          <label>Weight (kg)</label>
          <input type="number" class="form-control" name="weight"
                 min="20" max="300" step="0.1" placeholder="e.g. 60" required>
        </div>
        <div class="col-md-4">
          <label>Daily Steps</label>
          <input type="number" class="form-control" name="steps"
                 placeholder="e.g. 6000" value="6000" min="0" max="50000">
        </div>

        <!-- Lifestyle -->
        <div class="col-12 mt-2">
          <div class="section-title">Lifestyle Factors</div>
        </div>
        <div class="col-md-4">
          <label>Sleep Hours (per night)</label>
          <input type="number" class="form-control" name="sleep"
                 min="1" max="12" step="0.5" placeholder="e.g. 7" required>
        </div>
        <div class="col-md-4">
          <label>Stress Level (1 = low, 10 = high)</label>
          <input type="number" class="form-control" name="stress"
                 min="1" max="10" placeholder="e.g. 5" required>
        </div>
        <div class="col-md-4">
          <label>Current Mood</label>
          <select class="form-select" name="mood">
            <option value="happy">Happy 😊</option>
            <option value="neutral" selected>Neutral 😐</option>
            <option value="sad">Sad 😔</option>
            <option value="anxious">Anxious 😟</option>
            <option value="tired">Tired 😴</option>
          </select>
        </div>
        <div class="col-md-6">
          <label>Exercise Level</label>
          <select class="form-select" name="exercise" required>
            <option value="sedentary">Sedentary — little or no exercise</option>
            <option value="light">Light — 1–3 days/week</option>
            <option value="moderate" selected>Moderate — 3–5 days/week</option>
            <option value="active">Active — 6–7 days/week</option>
            <option value="very_active">Very Active — twice/day training</option>
          </select>
        </div>
        <div class="col-md-6">
          <label>Health Goal</label>
          <select class="form-select" name="goal" required>
            <option value="lose">Lose Weight</option>
            <option value="maintain" selected>Maintain Weight</option>
            <option value="gain">Gain Weight</option>
          </select>
        </div>

        <!-- Submit -->
        <div class="col-12 text-center mt-3">
          <button type="submit" class="btn btn-submit text-white" id="submitBtn">
            Get My Health Report →
          </button>
        </div>

      </div>
    </form>
  </div>
</div>

<script>
document.getElementById('healthForm').addEventListener('submit', function(e) {
  const age    = +document.querySelector('[name=age]').value;
  const height = +document.querySelector('[name=height]').value;
  const weight = +document.querySelector('[name=weight]').value;
  const sleep  = +document.querySelector('[name=sleep]').value;
  const stress = +document.querySelector('[name=stress]').value;

  if (age < 10 || age > 100)       { alert('Enter a valid age (10–100).');      e.preventDefault(); return; }
  if (height < 100 || height > 250){ alert('Height must be 100–250 cm.');        e.preventDefault(); return; }
  if (weight < 20 || weight > 300) { alert('Weight must be 20–300 kg.');          e.preventDefault(); return; }
  if (sleep < 1 || sleep > 12)     { alert('Sleep hours must be 1–12.');          e.preventDefault(); return; }
  if (stress < 1 || stress > 10)   { alert('Stress level must be 1–10.');         e.preventDefault(); return; }

  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analysing...';
  btn.disabled = true;
});
</script>
</body>
</html>
